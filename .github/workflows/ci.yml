name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cljc-contract:
    name: CLJC contract gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: Test CLJC contract
        run: clojure -M:test
