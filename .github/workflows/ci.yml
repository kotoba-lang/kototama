name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 0"

jobs:
  cljc-contract:
    name: CLJC contract gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: Install wasm-tools
        # kototama.tender-test shells out to `wasm-tools parse` to assemble
        # its WAT fixtures into real Wasm bytes (Chicory Parser/Instance
        # linkage, not mocked) -- pinned version, prebuilt binary release,
        # not `cargo install` (would need the whole Rust toolchain just for
        # one static binary).
        run: |
          curl -sSL -o wasm-tools.tar.gz \
            https://github.com/bytecodealliance/wasm-tools/releases/download/v1.252.0/wasm-tools-1.252.0-x86_64-linux.tar.gz
          tar xzf wasm-tools.tar.gz
          sudo mv wasm-tools-1.252.0-x86_64-linux/wasm-tools /usr/local/bin/wasm-tools
          wasm-tools --version
      - name: Test CLJC contract
        run: clojure -M:test
      - name: Lint CLJC contract
        run: clojure -M:lint
      - name: R3 fleet-gate (acceptance harness)
        run: clojure -M:cli fleet-gate
      - name: R3 fleet daemon dry-run (systemd wrapper path)
        run: |
          chmod +x deploy/bin/kototama-fleet-daemon
          deploy/bin/kototama-fleet-daemon \
            --wasm test/kototama/fixtures/kotoba-compiled-fact.wasm \
            --root /tmp/kototama-fleet-ci \
            --interval-ms 0 \
            --max-passes 1 \
            --max-ticks 1
      - name: R3 packaging static check
        run: bash deploy/validate-packaging.sh
      - name: R3 staging-smoke (non-root)
        run: |
          chmod +x deploy/staging-smoke.sh
          bash deploy/staging-smoke.sh

  web:
    name: browser WASM AOT demo gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node web/verify.mjs
      - run: node web/verify-kgraph.mjs
      - run: node web/verify-actor-host.mjs
      - run: node web/verify-host-free.mjs

  postgresql-interop:
    name: PostgreSQL ${{ matrix.postgresql }} / JDK 21 / Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgresql: [14, 15, 17]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: Install PostgreSQL ${{ matrix.postgresql }} binaries
        env:
          PG_MAJOR: ${{ matrix.postgresql }}
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "postgresql-${PG_MAJOR}"
          echo "/usr/lib/postgresql/${PG_MAJOR}/bin" >> "$GITHUB_PATH"
      - name: Released PostgreSQL interoperability
        run: clojure -M:postgresql-interop

  postgresql-pool-soak:
    name: PostgreSQL weekly 3000-operation pool soak
    if: github.event_name == 'schedule'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: Install released PostgreSQL 17
        run: brew install postgresql@17
      - name: Bounded contention soak
        env:
          KOTOTAMA_POOL_SOAK_OPS: "1000"
        run: |
          export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"
          clojure -M:postgresql-interop
