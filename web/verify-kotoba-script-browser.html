<!doctype html>
<meta charset="utf-8">
<title>Kotoba Script browser security E2E</title>
<pre id="result">RUNNING</pre>
<script type="module">
  import { runKotobaScriptIsolated } from "./kotoba-script-worker-host.mjs";

  const hex = bytes => [...bytes].map(x => x.toString(16).padStart(2, "0")).join("");
  const digest = async text => hex(new Uint8Array(await crypto.subtle.digest(
    "SHA-256", new TextEncoder().encode(text))));
  const manifestFor = async sourceText => ({
    "kotoba.artifact/schema": "kotoba-js-artifact/v1",
    "kotoba.artifact/source-digest": "source",
    "kotoba.artifact/kir-digest": "kir",
    "kotoba.artifact/compiler-version": "compiler",
    "kotoba.artifact/output-digest": await digest(sourceText)
  });
  const moduleSource = body => `
export const kotobaArtifact=Object.freeze({schema:'kotoba-js-artifact/v1',sourceDigest:'source',kirDigest:'kir',compilerVersion:'compiler',requiredCapabilities:Object.freeze([])});
export function instantiateKotoba(grants){if(Object.keys(grants).length)throw new Error('unexpected-grant');return Object.freeze({main(){${body}}});}`;

  try {
    const good = moduleSource("return 42n;");
    const value = await runKotobaScriptIsolated({
      sourceText: good, manifest: await manifestFor(good), timeoutMs: 30000
    });
    if (value.value !== 42n) throw new Error("wrong-result");

    let tamperRejected = false;
    try {
      await runKotobaScriptIsolated({
        sourceText: `${good}\n//tampered`, manifest: await manifestFor(good), timeoutMs: 30000
      });
    } catch (error) { tamperRejected = /digest-mismatch/.test(error.message); }
    if (!tamperRejected) throw new Error("tamper-not-rejected");

    const hanging = moduleSource("for(;;){}");
    let timeoutRejected = false;
    try {
      await runKotobaScriptIsolated({
        sourceText: hanging, manifest: await manifestFor(hanging), timeoutMs: 250
      });
    } catch (error) { timeoutRejected = /worker-timeout/.test(error.message); }
    if (!timeoutRejected) throw new Error("timeout-not-rejected");
    document.querySelector("#result").textContent = "PASS:42,digest-rejected,timeout-terminated";
  } catch (error) {
    document.querySelector("#result").textContent = `FAIL:${error.message}`;
  }
</script>
